name: CI/CD + DEVSECOPS Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write      # Perlu izin ini untuk deploy ke Pages
      id-token: write   # Perlu izin ini untuk deploy ke Pages
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validasi HTML
        run: |
          npm install -g htmlhint
          htmlhint index.html

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/web-paris-cafe:latest .

      - name: Scan Docker Image (Trivy) 🔒
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/web-paris-cafe:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Login ke Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push ke Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/web-paris-cafe:latest

      # Ganti cara deploy ke GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
